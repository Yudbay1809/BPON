name: BPON CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Generate Prisma Client
      run: npx prisma generate
      
    - name: Run Linter
      run: npm run lint
      
    - name: Run Type Check
      run: npx tsc --noEmit
      
    - name: Run Tests
      run: npm run test
      
    - name: Build Next.js
      run: npm run build
      env:
        # Dummy DB URL for build to succeed if it attempts static generation
        DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
